# -*- shell-script -*-
#
# /etc/ferm/ferm.conf -- default ruleset shipped by the `pyferm` package
# (the Python port of ferm). Starter firewall for a single host.
#
# WARNING: this blocks ALL inbound traffic except SSH and ICMP. Any other
# service you run (HTTP, databases, ...) will be unreachable once the rules
# are applied. Add your services as fragments in /etc/ferm/ferm.d/*.conf
# BEFORE you enable the service, or you will lose access to them.
#
# Rules are NOT applied on package install (anti-lockout). Review this file,
# add your services, then opt in:
#     systemctl enable --now ferm
#
# Fragments in /etc/ferm/ferm.d/*.conf are included at the end (sorted
# alphabetically), so you can extend the policy without editing this file.
# An optional SSH brute-force throttle ships (disabled) under
# /usr/share/doc/pyferm/examples/ -- copy it into ferm.d/ if you want it.

@def $SSH_PORT = ssh;     # set to your real port if SSH is non-standard

# INPUT body shared by both address families.
@def &INPUT_COMMON() = {
    # connection tracking: accept replies, drop bogus packets early. The
    # ESTABLISHED rule keeps your CURRENT SSH session alive when you first
    # enable the firewall.
    mod state state INVALID DROP;
    mod state state (ESTABLISHED RELATED) ACCEPT;

    # loopback is always trusted
    interface lo ACCEPT;

    # inbound SSH (no aggressive throttle by default -- see the header).
    proto tcp dport $SSH_PORT ACCEPT;
}

domain ip table filter {
    chain INPUT {
        policy DROP;
        &INPUT_COMMON();
        # respond to IPv4 ping
        proto icmp icmp-type echo-request ACCEPT;
        # To log drops (rate-limited so they cannot flood), uncomment:
        # mod limit limit 5/minute LOG log-prefix "ferm-drop: ";
    }
    chain OUTPUT policy ACCEPT;     # outbound unrestricted
    chain FORWARD policy DROP;      # not a router
}

domain ip6 table filter {
    chain INPUT {
        policy DROP;
        &INPUT_COMMON();
        # ICMPv6 is mandatory (neighbor discovery, PMTU); dropping it
        # silently breaks IPv6. Accept the RFC 4890 minimal safe set rather
        # than every type (a blanket accept would also pass Redirect, type
        # 137, and similar from off-link).
        proto ipv6-icmp icmpv6-type (
            destination-unreachable packet-too-big time-exceeded
            parameter-problem echo-request echo-reply
            neighbour-solicitation neighbour-advertisement
            router-solicitation router-advertisement
        ) ACCEPT;
        # mod limit limit 5/minute LOG log-prefix "ferm-drop6: ";
    }
    chain OUTPUT policy ACCEPT;
    chain FORWARD policy DROP;
}

# host-local drop-in fragments (the directory ships empty)
@include 'ferm.d/';
