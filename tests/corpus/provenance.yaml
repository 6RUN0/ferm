# Provenance manifest for the wild-config corpus.
#
# One entry per tests/corpus/configs/*.ferm file. This is the single
# source of truth for where each harvested config came from; it replaces
# the old source table that used to live in the corpus README.
#
# Consumed only by test_provenance.py via yaml.safe_load. The commit
# field is a best-effort revision pin: the last commit that touched the
# source path at harvest time (2026-06-26). It records provenance, not a
# build dependency -- the .ferm files are vendored verbatim (modulo the
# sanitization edits recorded under `sanitized:`).
#
# Field order per entry: file, repo, path, commit, license, features,
# and an optional sanitized block when the vendored copy was edited.

