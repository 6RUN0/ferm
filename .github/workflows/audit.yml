---
# Weekly dependency and CI-config audit.  pip-audit findings appear
# without any push (a CVE lands against an already-locked version), so
# a push-triggered gate would never see them -- a schedule is the only
# trigger that matches how this class of problem arrives.
#
# GitHub fires `schedule` from the workflow file on the default branch
# only, so the cron becomes active once the port lands on master.
on:
  workflow_dispatch:
  schedule:
    # Monday 06:20 UTC; an off-peak minute (GitHub throttles the
    # top-of-hour spike).
    - cron: '20 6 * * 1'
  # Stopgap while the port lives on a non-default branch where the
  # cron above never fires: piggyback on every push.  Once the port
  # lands on master the cron takes over and this trigger can shrink
  # back to paths: ['.github/workflows/audit.yml'] (self-validation).
  push:
    branches: [python-port]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # The escalation step files an issue when a scheduled run fails.
      issues: write
    steps:
      - id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          enable-cache: true

      - name: Sync the locked environment
        run: uv sync --locked

      - name: Audit the dependencies (bandit + pip-audit)
        run: uv run nox -s audit

      - name: Lint the CI workflows (actionlint + zizmor)
        run: uv run nox -s workflows

      # A red scheduled run otherwise only emails the workflow author;
      # an issue is the durable, visible escalation path.  Push-
      # triggered failures stay out: the pusher already sees those.
      - name: Escalate a failed scheduled run to an issue
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: >-
            ${{ github.server_url }}/${{ github.repository
            }}/actions/runs/${{ github.run_id }}
        run: |
          title='Weekly audit is red'
          body="Scheduled audit run failed: $RUN_URL"
          number=$(gh issue list --state open \
            --search "\"$title\" in:title" \
            --json number --jq '.[0].number')
          if [ -n "$number" ]; then
            gh issue comment "$number" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
