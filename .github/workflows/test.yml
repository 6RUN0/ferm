---
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'reference/doc/**'
      - 'reference/examples/**'
    branches: [main, master, develop, python-port]
  pull_request:
    paths-ignore:
      - 'reference/doc/**'
      - 'reference/examples/**'
    branches: [main, master, develop, python-port]
permissions:
  contents: read
# Rapid pushes to a working branch queue full matrix runs; only the
# newest commit's verdict matters, so cancel the superseded ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  reference:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        # Without `update` the image's stale apt indexes 404 whenever
        # the mirror rotates a package version out.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnet-dns-resolver-mock-perl

      - name: Run reference tests
        run: make -j"$(nproc)" -C reference check

  # Interpreter-independent gates, run once: ruff/mypy/pyright all pin
  # their analysis target to 3.11 in pyproject.toml, so repeating them
  # per matrix interpreter would re-check identical results.
  static:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          python-version: '3.11'
          enable-cache: true

      - name: Sync the locked environment
        run: uv sync --locked

      # mypy's incremental cache survives across runs (pyright has no
      # equivalent); a unique key forces a save every run while
      # restore-keys pulls the latest snapshot.  The lockfile hash scopes
      # it so a mypy upgrade starts a fresh cache.
      - name: Restore the mypy incremental cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # frozen: v5.0.5
        with:
          path: .mypy_cache
          key: mypy-${{ hashFiles('uv.lock') }}-${{ github.run_id }}
          restore-keys: |
            mypy-${{ hashFiles('uv.lock') }}-

      - name: Lint, typecheck and lint the CI workflows
        # mypy/pyright run in the typecheck session; SKIP keeps the lint
        # session's pre-commit pass from re-running them (pyright has no
        # cross-invocation cache, so a second full analysis is pure waste).
        env:
          SKIP: mypy,pyright
        run: uv run nox -s lint typecheck workflows

  port:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every interpreter declared supported in the trove classifiers.
        python: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false
          # diff-cover needs the merge base with the PR target branch;
          # a shallow clone has neither it nor the origin/* ref.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Sync the locked environment
        run: uv sync --locked

      - name: Run the suite (3.11 also under coverage with the patch gate)
        env:
          MATRIX_PYTHON: ${{ matrix.python }}
          # On pull requests diff-cover compares against the PR base so
          # the 90% patch gate bites in CI too; on pushes the default
          # base equals HEAD, the diff is empty and the gate is a no-op
          # (it already ran in the local preflight).
          FERM_DIFF_BASE: >-
            ${{ github.event_name == 'pull_request'
                && format('origin/{0}', github.base_ref)
                || 'origin/python-port' }}
        # Coverage % is line-based and identical across interpreters, so
        # only one leg measures it (and runs the diff-cover patch gate);
        # the others run the same suite without the instrumentation tax.
        run: |
          if [ "$MATRIX_PYTHON" = '3.11' ]; then
            uv run nox -s coverage
          else
            uv run nox -s tests
          fi

      # One leg is enough for trend surfacing: the suite and therefore
      # the percentages are identical across interpreters.
      - name: Publish the coverage report to the job summary
        if: matrix.python == '3.11'
        run: uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Upload the coverage XML for offline trend analysis
        if: matrix.python == '3.11'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # frozen: v6.0.0
        with:
          name: coverage-xml
          path: coverage.xml

  # Deliberately light (no mutation/crashfuzz here): the wheel smoke and
  # the lowest-bounds suite together stay around two minutes.
  package:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          enable-cache: true

      - name: Sync the locked environment
        run: uv sync --locked

      - name: Build and smoke-test the wheel
        run: uv run nox -s build

      - name: Test against the lowest declared dependency bounds
        run: uv run nox -s deps_lowest

  golden-oracle:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false

      - name: Install the Perl oracle dependency
        # Without `update` the image's stale apt indexes 404 whenever
        # the mirror rotates a package version out.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnet-dns-resolver-mock-perl

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          enable-cache: true

      - name: Sync the locked environment
        run: uv sync --locked

      - name: Validate the golden harness against the Perl oracle
        run: uv run nox -s golden_oracle

      # The Hypothesis example database only grows: a unique key forces
      # a save after every run while restore-keys pulls the most recent
      # snapshot, so counterexamples and the explored coverage frontier
      # accumulate across runs instead of restarting from scratch.
      - name: Restore the accumulated Hypothesis example database
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # frozen: v5.0.5
        with:
          path: .hypothesis
          key: hypothesis-${{ github.run_id }}
          restore-keys: |
            hypothesis-

      - name: Differential fuzzing against the oracle (thorough)
        run: uv run nox -s fuzz

  # Light per-PR kernel proof: the rootless delta-apply e2e wraps its nft
  # work in its own ``unshare -rn`` (no docker), so it runs on a stock
  # runner and gives the nft data path a live backstop every PR. The heavy
  # docker e2e (lockout/datapath/conformance) stays on the weekly e2e.yml.
  # The test self-skips when unprivileged user namespaces or nft are
  # absent, so a skip here means "not exercised", not "passed".
  kernel-rootless:
    runs-on: ubuntu-latest
    # Cap the job so a hung apt/uv-sync/nft step fails fast instead of
    # stalling a PR to the 6h default (mirrors e2e.yml's kernel-e2e).
    timeout-minutes: 15
    steps:
      - id: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false

      - name: Install the nftables userspace
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nftables

      # Ubuntu 24.04 runners gate unprivileged user namespaces behind an
      # AppArmor knob; relax it so the test's rootless ``unshare -rn``
      # actually runs instead of self-skipping. A no-op where the knob is
      # absent.
      - name: Allow unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          enable-cache: true

      - name: Sync the locked environment
        run: uv sync --locked

      - name: Rootless live-nft delta-apply e2e (no docker)
        run: uv run nox -s delta_apply_e2e
