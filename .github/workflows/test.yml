---
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'reference/doc/**'
      - 'reference/examples/**'
    branches:
      - master
  pull_request:
    paths-ignore:
      - 'reference/doc/**'
      - 'reference/examples/**'
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: checkout
        uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            libnet-dns-resolver-mock-perl

      - name: Runt unit tests
        run: make -j$(nproc) -C reference check
