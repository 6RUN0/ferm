---
# Tag-gated release of three artifacts: the standalone binary (GitHub
# Release), the native .deb (GitHub Release asset), and the PyPI
# wheel+sdist. The published artifacts run as root on end users' hosts, so
# this workflow is the publication trust boundary: minimal token scopes,
# SHA-pinned actions, download->verify before signing, an environment gate in
# front of every upload, and the single irreversible step (uv publish) last.
on:
  push:
    # ONLY a py-v* tag publishes. This REPLACES the old v* trigger on purpose:
    # the repo also carries upstream Perl v* tags, and leaving a v* trigger
    # would re-run this release on, e.g., v2.7 and mis-resolve the version.
    tags: ['py-v*']
  workflow_dispatch: {}     # manual build + gates WITHOUT publishing
permissions:
  contents: read            # explicit minimal top-level scope
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Never cancel a release mid-publish: a half-created Release with a
  # detached attestation is worse than a queued second run.
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # the build runs arbitrary Python; no write needed
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0     # release builds need the full tag history

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          # No cache on the release trust boundary: a tag-triggered publish
          # must not consume a potentially poisoned runtime cache (zizmor
          # cache-poisoning). Releases are rare; cache speed is irrelevant.
          enable-cache: false

      # The lockfile must match pyproject on every version-reading job.
      - name: Verify the lockfile is in sync
        run: uv lock --check

      # Pulls the large manylinux_2_28 image and compiles with Nuitka;
      # expect this step to take several minutes on a stock runner.
      - name: Build standalone binary (release mode, clean checkout)
        run: |
          python packaging/build.py --action=build --mode=release \
            --tag "${GITHUB_REF_NAME}" --out dist

      - name: Verify the golden suite against the packaged binary
        run: python packaging/build.py --action=verify-golden --out dist

      - name: Smoke-test the tag-anchored --version
        run: python packaging/build.py --action=smoke --out dist

      # glibc-floor gate: load the binary on debian:10 (glibc 2.28, the
      # advertised floor) -- NOT the manylinux build image -- so a symbol above
      # the floor surfaces here, not on a user's old distro. A plain tag is
      # fine: this image only proves the binary loads, it ships nothing, and
      # debian 10 is a frozen oldstable release.
      - name: Floor gate -- run on glibc 2.28 image
        run: |
          python packaging/build.py --action=run-on-image \
            --image=debian:10-slim --out dist

      # Hard-required: if the resolver container fails to come up the
      # release fails.  No skip, no xfail.
      - name: DNS resolve gate (blocker, no skip)
        run: python packaging/build.py --action=run-dns-gate --out dist

      # Hard-required: if the confirm-timeout harness fails to come up the
      # release fails.  No skip, no xfail.  Needs only --cap-add=NET_ADMIN,
      # which is grantable on a stock runner; rules are really applied then
      # rolled back inside the throwaway container, and no real traffic flows.
      - name: Interactive confirm-timeout gate (blocker, no skip)
        run: python packaging/build.py --action=run-interactive-gate --out dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # frozen: v4.6.2
        with:
          name: ferm-dist
          path: dist/

  build-deb:
    # Parallel to `build`: the native .deb is an independent reversible stage.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          # No cache on the release trust boundary: a tag-triggered publish
          # must not consume a potentially poisoned runtime cache (zizmor
          # cache-poisoning). Releases are rare; cache speed is irrelevant.
          enable-cache: false

      - name: Verify the lockfile is in sync
        run: uv lock --check

      # Builds the digest-pinned debian image, stamps the version via dch,
      # runs dpkg-buildpackage + lintian (E: reds), version-anchors the dpkg
      # Version field.
      - name: Build the native .deb (release mode, clean checkout)
        run: |
          python packaging/build.py --action=build-deb --mode=release \
            --tag "${GITHUB_REF_NAME}" --out dist

      # Install-smoke in clean containers: clean install, Perl-ferm migration,
      # symlinked-legacy refusal, and the fail-closed source-tar/sdist manifest.
      - name: Install-smoke the .deb
        run: python packaging/build.py --action=smoke-deb --out dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # frozen: v4.6.2
        with:
          name: pyferm-deb
          path: dist/pyferm_*.deb

  dry-run-pypi:
    # Tokenless early diagnostics on workflow_dispatch: build + a publish
    # dry-run with NO id-token, so the token topology is pinned statically --
    # the OIDC-bearing publish-pypi job is structurally unreachable off a tag.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          # No cache on the release trust boundary: a tag-triggered publish
          # must not consume a potentially poisoned runtime cache (zizmor
          # cache-poisoning). Releases are rare; cache speed is irrelevant.
          enable-cache: false

      - name: Verify the lockfile is in sync
        run: uv lock --check

      - name: Build wheel + sdist
        run: uv build --out-dir dist

      - name: Validate wheel contents
        run: uvx check-wheel-contents dist/*.whl

      # --dry-run does NOT mint an OIDC token; this job has no id-token: write,
      # so it cannot publish even by accident.
      - name: Publish dry-run (no token)
        run: uv publish --dry-run

  publish-pypi:
    # The single IRREVERSIBLE step, last: both reversible stages must pass.
    needs: [build, build-deb]
    # Ref-guard ON THE JOB so workflow_dispatch never enters the token-bearing
    # job at all (not merely skips a step).
    if: startsWith(github.ref, 'refs/tags/py-v')
    runs-on: ubuntu-latest
    # Repo-side gate: the `release` environment carries required reviewers and
    # a tag-matching rule. MANDATORY -- an empty environment lets any workflow
    # publish (the real ACL is the PyPI Trusted Publisher's environment field).
    environment: release
    permissions:
      contents: read
      id-token: write         # OIDC for Trusted Publishing + attestation
      attestations: write     # PEP 740 build-provenance attestation
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # frozen: v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # frozen: v8.2.0
        with:
          # No cache on the release trust boundary: a tag-triggered publish
          # must not consume a potentially poisoned runtime cache (zizmor
          # cache-poisoning). Releases are rare; cache speed is irrelevant.
          enable-cache: false

      - name: Verify the lockfile is in sync
        run: uv lock --check

      - name: Build wheel + sdist into a clean dist
        run: |
          rm -rf dist
          uv build --out-dir dist

      - name: Validate wheel contents
        run: uvx check-wheel-contents dist/*.whl

      # Assert dist holds EXACTLY one wheel + one sdist before attesting: a
      # stray or missing file would otherwise be attested (or globbed to zero).
      - name: Assert the dist composition
        run: |
          set -eu
          whl=$(find dist -maxdepth 1 -name '*.whl' | wc -l)
          sdist=$(find dist -maxdepth 1 -name '*.tar.gz' | wc -l)
          test "$whl" -eq 1 || { echo "expected 1 wheel, found $whl" >&2; exit 1; }
          test "$sdist" -eq 1 || { echo "expected 1 sdist, found $sdist" >&2; exit 1; }

      - name: Attest build provenance (wheel + sdist)
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018  # frozen: v1.4.4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      # Trusted Publishing (OIDC): no token secret. uv generates and uploads
      # PEP 740 attestations to the index. Fails closed if the PyPI Trusted
      # Publisher (with its `release` environment) is not configured.
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

  publish:
    needs: [build, build-deb]
    # Ref-guard so workflow_dispatch builds the gates but never publishes;
    # only a pushed py-v* tag reaches this job.
    if: startsWith(github.ref, 'refs/tags/py-v')
    runs-on: ubuntu-latest
    # Repo-side gate: the `release` environment carries required reviewers
    # and a tag-matching deployment rule.
    environment: release
    # One job-level block replaces the top-level scope for this job.
    permissions:
      contents: write         # create the Release and upload assets
      id-token: write         # OIDC token for the attestation
      attestations: write     # write the build provenance attestation
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # frozen: v4.3.0
        with:
          name: ferm-dist
          path: dist/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # frozen: v4.3.0
        with:
          name: pyferm-deb
          path: dist/

      # attest-build-provenance signs WHATEVER it is handed, so cross-check
      # the digest this job received against the build job's SHA256SUMS
      # first; a swap in artifact storage would otherwise be attested as
      # genuine. Then append the .deb digest to the same manifest.
      - name: Verify artifact integrity and extend the manifest
        run: |
          cd dist && sha256sum -c SHA256SUMS
          sha256sum pyferm_*.deb >> SHA256SUMS

      - name: Attest build provenance (binary + deb)
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018  # frozen: v1.4.4
        with:
          subject-path: |
            dist/ferm-*-linux-x86_64.tar.gz
            dist/pyferm_*.deb

      # The official gh client, not a third-party action.  --verify-tag
      # refuses if the tag is absent from the remote, closing the window
      # where an environment approval could target an arbitrary ref; it
      # layers on top of the tag protection rules, it does not replace them.
      - name: Create the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # This job does NOT check out the repo (it only consumes artifacts),
          # so gh has no local git remote to resolve the target repository
          # from; name it explicitly. --verify-tag and --generate-notes both
          # work over the API and need no working tree.
          GH_REPO: ${{ github.repository }}
        run: |
          # A PEP 440 pre-release (aN/bN/rcN) must not be published as the
          # "Latest" release; flag it so stable tags stay the default.
          flags=(--title "${GITHUB_REF_NAME}" --generate-notes --verify-tag)
          case "${GITHUB_REF_NAME}" in
            *a*|*b*|*rc*) flags+=(--prerelease) ;;
          esac
          gh release create "${GITHUB_REF_NAME}" \
            dist/ferm-*-linux-x86_64.tar.gz dist/pyferm_*.deb dist/SHA256SUMS \
            "${flags[@]}"
